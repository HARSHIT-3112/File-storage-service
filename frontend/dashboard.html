<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07080d;
    --surface: #0f1117;
    --surface2: #161820;
    --border: #1f2130;
    --border2: #2a2d40;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --cyan: #22d3ee;
    --green: #34d399;
    --red: #f87171;
    --yellow: #fbbf24;
    --text: #e8eaf0;
    --muted: #5a5f7a;
    --muted2: #8b90aa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  .grid-lines {
    position: fixed; inset: 0;
    background-image: linear-gradient(rgba(108,99,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(108,99,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 0; pointer-events: none;
  }

  /* NAV */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(7,8,13,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px; height: 64px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .nav-brand {
    font-size: 20px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, #6c63ff, #22d3ee);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    display: flex; align-items: center; gap: 10px;
  }

  .nav-right { display: flex; align-items: center; gap: 12px; }

  .nav-user {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 14px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 10px; font-size: 13px;
  }

  .avatar {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, var(--accent), var(--cyan));
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700; color: #fff;
  }

  .btn-logout {
    padding: 7px 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 8px;
    color: var(--muted2); font-family: 'Syne', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { border-color: var(--red); color: var(--red); }

  /* MAIN */
  main {
    max-width: 1100px; margin: 0 auto;
    padding: 40px 24px; position: relative; z-index: 1;
  }

  /* QUOTA BAR */
  .quota-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px 28px;
    display: flex; align-items: center; gap: 32px;
    margin-bottom: 28px;
    animation: fadeUp 0.4s ease both;
  }

  .quota-icon { font-size: 32px; flex-shrink: 0; }

  .quota-info { flex: 1; }

  .quota-title {
    font-size: 13px; font-weight: 600; margin-bottom: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }

  .quota-label { color: var(--muted2); font-family: 'DM Mono', monospace; font-size: 11px; }

  .quota-bar-wrap {
    height: 6px; background: var(--bg);
    border-radius: 3px; overflow: hidden;
  }

  .quota-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--cyan));
    transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    width: 0%;
  }

  .quota-stats {
    display: flex; gap: 28px; margin-left: auto; flex-shrink: 0;
  }

  .quota-stat { text-align: center; }
  .quota-stat-val { font-size: 20px; font-weight: 700; font-family: 'DM Mono', monospace; }
  .quota-stat-key { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

  /* UPLOAD ZONE */
  .upload-zone {
    border: 2px dashed var(--border2);
    border-radius: 16px; padding: 48px;
    text-align: center; cursor: pointer;
    transition: all 0.3s; margin-bottom: 28px;
    background: var(--surface);
    animation: fadeUp 0.4s ease both;
    animation-delay: 0.05s;
    position: relative;
  }

  .upload-zone:hover, .upload-zone.dragover {
    border-color: var(--accent);
    background: rgba(108,99,255,0.04);
    transform: scale(1.005);
  }

  .upload-zone.dragover { box-shadow: 0 0 40px rgba(108,99,255,0.12); }

  .upload-icon { font-size: 40px; margin-bottom: 12px; }

  .upload-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }

  .upload-sub {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--muted); margin-bottom: 20px;
  }

  .btn-upload {
    padding: 10px 24px; border-radius: 8px; border: none;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-family: 'Syne', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all 0.2s;
  }

  .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(108,99,255,0.3); }

  #file-input { display: none; }

  /* UPLOAD PROGRESS */
  .upload-progress {
    display: none; margin-top: 16px;
    background: var(--bg); border-radius: 8px; padding: 12px 16px;
  }

  .progress-bar-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 2px; transition: width 0.3s; width: 0%; }
  .progress-text { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted2); }

  /* FILE GRID */
  .files-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease both; animation-delay: 0.1s;
  }

  .files-title { font-size: 16px; font-weight: 700; }
  .files-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }

  .view-toggle { display: flex; gap: 4px; }
  .view-btn {
    width: 32px; height: 32px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
    transition: all 0.2s;
  }
  .view-btn.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }

  .file-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
    animation: fadeUp 0.4s ease both; animation-delay: 0.15s;
  }

  .file-grid.list-view {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  /* FILE CARD */
  .file-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    transition: all 0.2s; cursor: pointer;
    animation: fadeUp 0.3s ease both;
  }

  .file-card:hover {
    border-color: var(--border2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }

  .file-preview {
    height: 120px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }

  .file-preview img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.3s;
  }

  .file-card:hover .file-preview img { transform: scale(1.05); }

  .file-type-icon { font-size: 36px; }

  .file-info { padding: 12px; }

  .file-name {
    font-size: 12px; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .file-meta {
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--muted); display: flex; justify-content: space-between;
  }

  .file-actions {
    padding: 8px 12px; border-top: 1px solid var(--border);
    display: flex; gap: 6px;
  }

  .btn-action {
    flex: 1; padding: 6px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; color: var(--muted2);
    font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer;
    transition: all 0.2s; text-align: center;
  }

  .btn-action:hover { border-color: var(--accent); color: var(--accent); }
  .btn-action.delete:hover { border-color: var(--red); color: var(--red); }

  /* LIST VIEW */
  .file-grid.list-view .file-card {
    display: flex; align-items: center; gap: 14px;
  }

  .file-grid.list-view .file-preview {
    width: 48px; height: 48px; flex-shrink: 0;
    border-radius: 0; border-right: 1px solid var(--border);
  }

  .file-grid.list-view .file-type-icon { font-size: 20px; }

  .file-grid.list-view .file-info {
    flex: 1; padding: 12px 0;
  }

  .file-grid.list-view .file-actions {
    padding: 12px; border-top: none; border-left: 1px solid var(--border);
    flex-direction: row;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty-text { font-size: 15px; font-weight: 600; margin-bottom: 6px; color: var(--muted2); }
  .empty-sub { font-family: 'DM Mono', monospace; font-size: 11px; }

  /* TOAST */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 10px; padding: 12px 18px;
    font-family: 'DM Mono', monospace; font-size: 12px;
    z-index: 1000; transform: translateY(80px); opacity: 0;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    max-width: 300px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { border-color: rgba(52,211,153,0.3); color: var(--green); }
  .toast.error { border-color: rgba(248,113,113,0.3); color: var(--red); }

  /* PREVIEW MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 200; display: none; align-items: center; justify-content: center;
    backdrop-filter: blur(8px);
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 16px; padding: 0; max-width: 700px; width: 90%;
    max-height: 85vh; overflow: hidden;
    animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }

  .modal-title { font-size: 14px; font-weight: 600; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted2); cursor: pointer; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body {
    padding: 24px; text-align: center;
    max-height: calc(85vh - 120px); overflow-y: auto;
  }

  .modal-body img { max-width: 100%; max-height: 400px; border-radius: 8px; object-fit: contain; }

  .modal-footer {
    padding: 14px 20px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }

  .btn-sm {
    padding: 8px 16px; border-radius: 7px; border: 1px solid var(--border);
    background: transparent; color: var(--muted2);
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }

  .btn-sm:hover { border-color: var(--accent); color: var(--accent); }
  .btn-sm.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: #fff; }
  .btn-sm.primary:hover { box-shadow: 0 4px 16px rgba(108,99,255,0.3); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 600px) {
    .quota-stats { display: none; }
    .file-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div class="grid-lines"></div>

<nav>
  <div class="nav-brand">⬡ VAULT</div>
  <div class="nav-right">
    <div class="nav-user">
      <div class="avatar" id="nav-avatar">?</div>
      <span id="nav-name" style="font-size:13px;">Loading...</span>
    </div>
    <button class="btn-logout" onclick="logout()">Sign out</button>
  </div>
</nav>

<main>
  <!-- QUOTA -->
  <div class="quota-card">
    <div class="quota-icon">💾</div>
    <div class="quota-info">
      <div class="quota-title">
        Storage Used
        <span class="quota-label" id="quota-pct">0%</span>
      </div>
      <div class="quota-bar-wrap">
        <div class="quota-bar-fill" id="quota-bar"></div>
      </div>
    </div>
    <div class="quota-stats">
      <div class="quota-stat">
        <div class="quota-stat-val" id="quota-used">0 B</div>
        <div class="quota-stat-key">Used</div>
      </div>
      <div class="quota-stat">
        <div class="quota-stat-val" id="quota-total">5 GB</div>
        <div class="quota-stat-key">Total</div>
      </div>
      <div class="quota-stat">
        <div class="quota-stat-val" id="files-count">0</div>
        <div class="quota-stat-key">Files</div>
      </div>
    </div>
  </div>

  <!-- UPLOAD ZONE -->
  <div class="upload-zone" id="drop-zone"
    ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)"
    onclick="document.getElementById('file-input').click()">
    <div class="upload-icon">☁</div>
    <div class="upload-title">Drop files here</div>
    <div class="upload-sub">// images · PDFs · documents · max 50MB each</div>
    <button class="btn-upload" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
      Choose Files
    </button>
    <div class="upload-progress" id="upload-progress">
      <div class="progress-text" id="progress-text">Uploading...</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar"></div>
      </div>
    </div>
  </div>
  <input type="file" id="file-input" multiple accept="image/*,.pdf,.txt,.csv,.doc,.docx"
    onchange="handleFileSelect(this.files)">

  <!-- FILES -->
  <div class="files-header">
    <div>
      <div class="files-title">Your Files</div>
      <div class="files-count" id="files-label">Loading...</div>
    </div>
    <div class="view-toggle">
      <button class="view-btn active" id="grid-btn" onclick="setView('grid')" title="Grid">⊞</button>
      <button class="view-btn" id="list-btn" onclick="setView('list')" title="List">☰</button>
    </div>
  </div>

  <div class="file-grid" id="file-grid"></div>
</main>

<!-- PREVIEW MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Preview</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-sm" onclick="closeModal()">Close</button>
      <button class="btn-sm primary" id="modal-download" onclick="downloadFile()">↓ Download</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const API = '/api/v1/files';
  let currentView = 'grid';
  let currentFileUrl = '';
  let allFiles = [];

  function getToken() {
    const t = localStorage.getItem('vault_token');
    if (!t) window.location.href = 'index.html';
    return t;
  }

  function authHeaders() {
    return { 'Authorization': `Bearer ${getToken()}`, 'Content-Type': 'application/json' };
  }

  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
  }

  function formatBytes(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
  }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function fileIcon(contentType) {
    if (contentType.startsWith('image/')) return '🖼';
    if (contentType === 'application/pdf') return '📄';
    if (contentType.includes('word')) return '📝';
    if (contentType === 'text/csv') return '📊';
    return '📁';
  }

  async function loadQuota() {
    try {
      const res = await fetch(`${API}/quota/me`, { headers: authHeaders() });
      if (res.status === 401) return logout();
      const data = await res.json();

      document.getElementById('quota-used').textContent = formatBytes(data.used_bytes);
      document.getElementById('quota-total').textContent = data.quota_gb + ' GB';
      document.getElementById('quota-pct').textContent = data.percent_used + '%';
      setTimeout(() => {
        document.getElementById('quota-bar').style.width = Math.min(data.percent_used, 100) + '%';
      }, 300);
    } catch(e) {}
  }

  async function loadFiles() {
    try {
      const res = await fetch(`${API}/?limit=100`, { headers: authHeaders() });
      if (res.status === 401) return logout();
      const data = await res.json();
      allFiles = data.files;

      document.getElementById('files-count').textContent = data.total;
      document.getElementById('files-label').textContent = `${data.total} file${data.total !== 1 ? 's' : ''} stored`;

      renderFiles(allFiles);
    } catch(e) {
      document.getElementById('files-label').textContent = 'Failed to load files';
    }
  }

  function renderFiles(files) {
    const grid = document.getElementById('file-grid');
    if (files.length === 0) {
      grid.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-icon">☁</div>
          <div class="empty-text">Your vault is empty</div>
          <div class="empty-sub">// drop files above to get started</div>
        </div>`;
      return;
    }

    grid.innerHTML = files.map((f, i) => `
      <div class="file-card" style="animation-delay:${i * 0.03}s">
        <div class="file-preview" onclick="previewFile('${f.id}', '${f.original_name}', '${f.content_type}')">
          ${f.content_type.startsWith('image/') && f.is_processed === false
            ? `<div class="file-type-icon">${fileIcon(f.content_type)}</div>`
            : `<div class="file-type-icon">${fileIcon(f.content_type)}</div>`
          }
        </div>
        <div class="file-info">
          <div class="file-name" title="${f.original_name}">${f.original_name}</div>
          <div class="file-meta">
            <span>${formatBytes(f.size_bytes)}</span>
            <span>${formatDate(f.created_at)}</span>
          </div>
        </div>
        <div class="file-actions">
          <button class="btn-action" onclick="previewFile('${f.id}', '${f.original_name}', '${f.content_type}')">↗ View</button>
          <button class="btn-action delete" onclick="deleteFile('${f.id}', event)">✕ Del</button>
        </div>
      </div>
    `).join('');
  }

  function setView(view) {
    currentView = view;
    const grid = document.getElementById('file-grid');
    grid.classList.toggle('list-view', view === 'list');
    document.getElementById('grid-btn').classList.toggle('active', view === 'grid');
    document.getElementById('list-btn').classList.toggle('active', view === 'list');
  }

  // DRAG & DROP
  function onDragOver(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.add('dragover');
  }

  function onDragLeave(e) {
    document.getElementById('drop-zone').classList.remove('dragover');
  }

  function onDrop(e) {
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('dragover');
    handleFileSelect(e.dataTransfer.files);
  }

  function handleFileSelect(files) {
    if (!files.length) return;
    uploadFiles(Array.from(files));
  }

  async function uploadFiles(files) {
    const progress = document.getElementById('upload-progress');
    const progressBar = document.getElementById('progress-bar');
    const progressText = document.getElementById('progress-text');

    progress.style.display = 'block';

    for (let i = 0; i < files.length; i++) {
      const file = files[i];
      progressText.textContent = `Uploading ${file.name} (${i + 1}/${files.length})...`;
      progressBar.style.width = '20%';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch(`${API}/upload`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${getToken()}` },
          body: formData,
        });

        const data = await res.json();
        if (!res.ok) {
          toast(data.detail || `Failed to upload ${file.name}`, 'error');
        } else {
          progressBar.style.width = '100%';
          toast(`✓ ${file.name} uploaded!`, 'success');
        }
      } catch(e) {
        toast(`Failed to upload ${file.name}`, 'error');
      }
    }

    setTimeout(() => {
      progress.style.display = 'none';
      progressBar.style.width = '0%';
    }, 500);

    // reset file input
    document.getElementById('file-input').value = '';
    loadFiles();
    loadQuota();
  }

  async function previewFile(fileId, name, contentType) {
    document.getElementById('modal-title').textContent = name;
    document.getElementById('modal-body').innerHTML = '<div style="color:var(--muted);font-family:DM Mono,monospace;font-size:12px;">Loading...</div>';
    document.getElementById('modal').classList.add('open');

    try {
      const res = await fetch(`${API}/${fileId}/url`, { headers: authHeaders() });
      const data = await res.json();
      currentFileUrl = data.url;

      const body = document.getElementById('modal-body');
      if (contentType.startsWith('image/')) {
        body.innerHTML = `<img src="${data.url}" alt="${name}" />`;
      } else if (contentType === 'application/pdf') {
        body.innerHTML = `
          <div style="font-size:48px;margin-bottom:16px;">📄</div>
          <div style="font-weight:600;margin-bottom:8px;">${name}</div>
          <div style="font-family:DM Mono,monospace;font-size:11px;color:var(--muted);">PDF document · click download to open</div>`;
      } else {
        body.innerHTML = `
          <div style="font-size:48px;margin-bottom:16px;">${fileIcon(contentType)}</div>
          <div style="font-weight:600;margin-bottom:8px;">${name}</div>
          <div style="font-family:DM Mono,monospace;font-size:11px;color:var(--muted);">Click download to save this file</div>`;
      }
    } catch(e) {
      document.getElementById('modal-body').innerHTML = '<div style="color:var(--red);">Failed to load preview</div>';
    }
  }

  function closeModal(e) {
    if (e && e.target !== document.getElementById('modal')) return;
    document.getElementById('modal').classList.remove('open');
    currentFileUrl = '';
  }

  function downloadFile() {
    if (currentFileUrl) window.open(currentFileUrl, '_blank');
  }

  async function deleteFile(fileId, e) {
    e.stopPropagation();
    if (!confirm('Delete this file permanently?')) return;

    try {
      const res = await fetch(`${API}/${fileId}`, {
        method: 'DELETE',
        headers: authHeaders(),
      });
      if (res.ok) {
        toast('File deleted', 'success');
        loadFiles();
        loadQuota();
      } else {
        toast('Failed to delete file', 'error');
      }
    } catch(e) {
      toast('Error deleting file', 'error');
    }
  }

  function logout() {
    localStorage.removeItem('vault_token');
    window.location.href = 'index.html';
  }

  // set nav username from token
  function initUser() {
    const token = getToken();
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      const userId = payload.sub;
      document.getElementById('nav-avatar').textContent = 'U';
      document.getElementById('nav-name').textContent = userId.slice(0, 8) + '...';
    } catch(e) {}
  }

  // INIT
  initUser();
  loadQuota();
  loadFiles();

  // close modal on escape
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('modal').classList.remove('open');
  });
</script>
</body>
</html>
